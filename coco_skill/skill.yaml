name: paas-command-center
display_name: PaaS Command Center
description: >
  AI-native unified operations platform that correlates DevOps incidents,
  SaaS financial impact, and customer churn risk through natural language.
  Detects anomalies dynamically, generates cross-domain correlation reports,
  and provides prioritized action recommendations. Powered by Snowflake Cortex.
version: 2.0.0
author: PaaS Command Center Team

triggers:
  - "paas"
  - "command center"
  - "incident"
  - "outage"
  - "churn"
  - "infrastructure cost"
  - "revenue at risk"
  - "cost spike"
  - "error rate"
  - "service health"
  - "customer risk"
  - "cross-domain"
  - "correlate"
  - "retention"
  - "operational intelligence"

capabilities:
  - Dynamic incident detection via statistical anomaly analysis
  - Cross-domain correlation (DevOps errors + Finance costs + Customer churn)
  - Natural language query routing with Cortex Analyst semantic model
  - Real-time churn risk assessment linked to infrastructure events
  - Automated prioritized action recommendations (P0-P3)
  - Time-window correlation for any incident period
  - Verified SQL generation via semantic model (hallucination-resistant)

tools:
  - sql_execute
  - cortex_analyst

semantic_model: semantic_model/paas_command_center.yaml
