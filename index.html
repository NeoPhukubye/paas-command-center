<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaaS Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; line-height: 1.6; color: #94a3b8; margin-bottom: 2rem; }
        .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        a { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        a:hover { opacity: 0.85; }
        .primary { background: #3b82f6; color: #fff; }
        .secondary { border: 1px solid #475569; color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PaaS Command Center</h1>
        <p>A unified operations dashboard for monitoring finance, growth, and platform health metrics.</p>
        <div class="links">
            <a href="https://paas-command-center.onrender.com" class="primary">Live API</a>
            <a href="https://paas-command-center.onrender.com/docs" class="secondary">API Docs</a>
            <a href="https://github.com/neophukubye/paas-command-center" class="secondary">GitHub</a>
        </div>
    </div>
</body>
</html>
